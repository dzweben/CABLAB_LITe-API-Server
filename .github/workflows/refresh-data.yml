name: Refresh LITe REDCap Data

on:
  schedule:
    # Every 6 hours at :17 past the hour
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Serialize runs. The pipeline fetches → commits → `git pull --rebase`
# → vercel build/deploy, all against the same data files. If two runs
# overlap, a deploy can grab a participants.json that another run is
# mid-rebase / mid-write on, shipping a TRUNCATED file the API can't
# parse (dashboard renders empty). cancel-in-progress:false makes each
# run finish fully before the next starts, so a deploy always sees a
# consistent, fully-written file.
concurrency:
  group: refresh-lite-data
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch data from REDCap + Google Sheet
        env:
          REDCAP_API_URL: ${{ secrets.REDCAP_API_URL }}
          REDCAP_LITE_TOKEN: ${{ secrets.REDCAP_LITE_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          LITE_GOOGLE_SHEET_ID: ${{ secrets.LITE_GOOGLE_SHEET_ID }}
        run: node --max-old-space-size=6144 scripts/fetch-data.mjs

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add private/data/participants.json private/data/due-reminders.json private/data/last-fetch.json
          # --quiet on `diff --cached` (staged index) — covers both
          # modified-tracked and brand-new-untracked files.
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Auto-refresh LITe REDCap data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            # Rebase on top of any commit that landed since checkout
            # (e.g. a concurrent push) so we don't lose to a race.
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push retry $attempt failed, sleeping…"
              sleep 5
            done
          fi

      - name: Validate data files before deploy
        run: |
          set -e
          # Hard gate: never deploy a file that won't parse. If the fetch
          # or a rebase produced truncated/corrupt JSON, fail here so the
          # last known-good deploy stays live instead of shipping an
          # empty dashboard.
          for f in participants due-reminders last-fetch; do
            node -e "JSON.parse(require('fs').readFileSync('private/data/$f.json','utf8'))" \
              || { echo "::error::private/data/$f.json is not valid JSON — aborting deploy"; exit 1; }
          done
          # Sanity floor: participants.json must hold a non-trivial roster.
          node -e "const d=JSON.parse(require('fs').readFileSync('private/data/participants.json','utf8')); if(!Array.isArray(d.participants)||d.participants.length<100){console.error('::error::participants.json has only',(d.participants||[]).length,'records — aborting deploy');process.exit(1)} console.log('Validated',d.participants.length,'participants')"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -e
          npm install -g vercel
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "Deployed to: $DEPLOY_URL"
          if [ -n "$DEPLOY_URL" ]; then
            vercel alias set "$DEPLOY_URL" cablab-lite.vercel.app --token=$VERCEL_TOKEN
          fi
